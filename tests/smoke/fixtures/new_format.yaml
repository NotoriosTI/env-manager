# New format — environments block selects loader and credentials per environment.
# Used by both new-format cases; ENVIRONMENT env var switches between them.
#
# Case 3: ENVIRONMENT=gcp   → GCPSecretLoader, project overridden by gcp_project_id param.
#          Requires GCP secrets named APP_DB_NAME, APP_DB_HOST, APP_DB_PORT,
#          APP_DB_USER, APP_DB_PASSWORD.
# Case 4: ENVIRONMENT=local → DotEnvLoader reading .env in the same directory.
#
# gcp_project_id below is a placeholder; always overridden at runtime by the
# gcp_project_id= parameter or SMOKE_GCP_PROJECT_ID env var.

environments:
  local:
    origin: local
    dotenv_path: .env
  gcp:
    origin: gcp
    gcp_project_id: smoke-placeholder

variables:
  APP_DB_NAME:
    source: APP_DB_NAME
    type: str
  APP_DB_HOST:
    source: APP_DB_HOST
    type: str
  APP_DB_PORT:
    source: APP_DB_PORT
    type: int
  APP_DB_USER:
    source: APP_DB_USER
    type: str
  APP_DB_PASSWORD:
    source: APP_DB_PASSWORD
    type: str
